<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全国天気予報</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>全国天気予報</h1>
    <p class="subtitle" id="update-time">読み込み中...</p>
  </header>

  <main>
    <div id="loading" class="loading">

      <p>天気情報を取得中...</p>
    </div>
    <div id="error" class="error hidden"></div>
    <div id="regions"></div>
  </main>

  <footer>
    <p>データ提供: <a href="https://www.jma.go.jp/" target="_blank">気象庁</a></p>
  </footer>

  <script src="script.js"></script>

</html>
